name: Deploy to Firebase

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Build web app
        run: npm run build --workspace @coachos/web
        env:
          NODE_ENV: production

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Build Cloud Function
        run: npm run build
        working-directory: functions

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting,functions --project coachos-a70d6
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
